name: Build

# Builds installers for Windows and macOS.
# - Push a tag like `v0.1.0` to produce a GitHub Release with attached artifacts.
# - Or trigger manually from the Actions tab (artifacts only).
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

# Needed so the tag build can create/attach to a GitHub Release.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: --win
            artifact: stardust-windows
            glob: |
              dist/*.exe
          - os: macos-latest
            platform: --mac
            artifact: stardust-macos
            glob: |
              dist/*.dmg
              dist/*.zip
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npx electron-builder ${{ matrix.platform }} --publish never
        env:
          # No signing in CI — produce unsigned artifacts.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.glob }}
          if-no-files-found: warn

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.glob }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
