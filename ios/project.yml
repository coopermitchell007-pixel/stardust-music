# XcodeGen spec — `xcodegen generate` in ios/ rebuilds Stardust.xcodeproj.
name: Stardust
options:
  bundleIdPrefix: com.coopermitchell
  deploymentTarget:
    iOS: "16.0"
targets:
  Stardust:
    type: application
    platform: iOS
    sources:
      - path: Stardust
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.coopermitchell.stardust
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
    info:
      path: Stardust/Info.plist
      properties:
        CFBundleDisplayName: Stardust
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIViewControllerBasedStatusBarAppearance: true
